<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wachtwoord Herstellen | FleetConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #2c7da0;
            --bg-body: #f4f7fc;
            --white: #ffffff;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid #e2edf7;
            border-radius: 12px;
            box-sizing: border-box;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
        }
        .error { color: #b91c1c; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nieuw wachtwoord</h1>
        <div id="error" class="error"></div>
        <input type="password" id="newPassword" placeholder="Nieuw wachtwoord">
        <input type="password" id="confirmPassword" placeholder="Bevestig wachtwoord">
        <button id="updateBtn">Wachtwoord bijwerken</button>
    </div>

    <script type="module">
        import { AuthHelper } from './auth-helper.js';

        const updateBtn = document.getElementById('updateBtn');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const errorDiv = document.getElementById('error');

        updateBtn.addEventListener('click', async () => {
            const pass = newPassword.value;
            const confirm = confirmPassword.value;

            if (pass.length < 6) {
                errorDiv.innerText = 'Wachtwoord moet minimaal 6 tekens zijn.';
                errorDiv.style.display = 'block';
                return;
            }

            if (pass !== confirm) {
                errorDiv.innerText = 'Wachtwoorden komen niet overeen.';
                errorDiv.style.display = 'block';
                return;
            }

            const { data, error } = await AuthHelper.updatePassword(pass);

            if (error) {
                errorDiv.innerText = error.message;
                errorDiv.style.display = 'block';
            } else {
                alert('Wachtwoord succesvol bijgewerkt! U kunt nu inloggen.');
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
